<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IntelliOnboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

/* =========================================================
   GLOBAL
========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:
        "Segoe UI",
        Arial,
        sans-serif;

    min-height:100vh;

    overflow-x:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
        linear-gradient(
            135deg,
            #021B1A 0%,
            #063D36 30%,
            #0F6E56 100%
        );

    position:relative;

    padding:30px;
}

/* =========================================================
   ANIMATED BACKGROUND
========================================================= */

body::before{

    content:"";

    position:absolute;

    width:700px;
    height:700px;

    background:
        radial-gradient(
            circle,
            rgba(38,255,186,0.20),
            transparent 70%
        );

    top:-200px;
    left:-180px;

    animation:float1 8s infinite alternate ease-in-out;
}

body::after{

    content:"";

    position:absolute;

    width:550px;
    height:550px;

    background:
        radial-gradient(
            circle,
            rgba(255,255,255,0.10),
            transparent 70%
        );

    bottom:-180px;
    right:-150px;

    animation:float2 10s infinite alternate ease-in-out;
}

@keyframes float1{

    from{
        transform:translateY(0px);
    }

    to{
        transform:translateY(30px);
    }
}

@keyframes float2{

    from{
        transform:translateX(0px);
    }

    to{
        transform:translateX(-30px);
    }
}

/* =========================================================
   CARD
========================================================= */

.auth-card{

    position:relative;
    z-index:5;

    width:430px;

    padding:34px;

    border-radius:28px;

    background:
        rgba(255,255,255,0.10);

    backdrop-filter:blur(18px);

    border:
        1px solid rgba(255,255,255,0.18);

    box-shadow:
        0 10px 45px rgba(0,0,0,0.35);

    animation:fadeUp 0.6s ease;
}

@keyframes fadeUp{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0px);
    }
}

/* =========================================================
   VERSION
========================================================= */

.version{

    position:absolute;

    top:18px;
    right:18px;

    padding:6px 12px;

    border-radius:20px;

    background:
        rgba(255,255,255,0.12);

    color:#fff;

    font-size:12px;
    font-weight:600;

    border:
        1px solid rgba(255,255,255,0.15);
}

/* =========================================================
   LOGO
========================================================= */
.logo-wrap{
    text-align:center;
    margin-bottom:24px;
}

.logo{

    width:82px;
    height:82px;

    margin:auto;

    border-radius:22px;

    display:flex;
    align-items:center;
    justify-content:center;

    /* ✅ removed text styles */
    
    /* ✅ background changed (light for logo visibility) */
    background:#ffffff;

    /* ✅ better shadow */
    box-shadow:
        0 10px 30px rgba(0,0,0,0.20);

    overflow:hidden; /* ✅ ensures image fits */
}

.logo img{

    width:70%;
    height:70%;

    object-fit:contain;

}
.app-title{

    margin-top:18px;

    font-size:34px;
    font-weight:800;

    color:white;
}

.sub-title{

    margin-top:10px;

    color:
        rgba(255,255,255,0.80);

    font-size:14px;

    line-height:1.7;
}

/* =========================================================
   TABS
========================================================= */

.auth-tabs{

    margin-top:25px;

    display:flex;

    gap:10px;
}

.tab-btn{

    flex:1;

    padding:13px;

    border:none;

    border-radius:14px;

    cursor:pointer;

    font-size:14px;
    font-weight:700;

    background:
        rgba(255,255,255,0.10);

    color:white;

    transition:0.25s;
}

.tab-btn.active{

    background:
        linear-gradient(
            135deg,
            #1D9E75,
            #0F6E56
        );

    box-shadow:
        0 6px 20px rgba(0,0,0,0.25);
}

/* =========================================================
   FORM
========================================================= */

.form-section{

    margin-top:22px;
}

.form-group{

    margin-top:16px;
}

label{

    display:block;

    margin-bottom:8px;

    font-size:13px;
    font-weight:600;

    color:#fff;
}

.input-box{

    position:relative;
}

input,
select{

    width:100%;

    padding:14px 16px;

    border-radius:14px;

    border:
        1px solid rgba(255,255,255,0.12);

    background:
        rgba(255,255,255,0.08);

    color:white;

    font-size:14px;

    outline:none;

    transition:0.25s;
}

input::placeholder{
    color:rgba(255,255,255,0.55);
}

select{
    color:white;
}

option{
    color:black;
}

input:focus,
select:focus{

    border:
        1px solid rgba(38,255,186,0.50);

    background:
        rgba(255,255,255,0.12);

    box-shadow:
        0 0 0 4px rgba(38,255,186,0.12);
}

/* =========================================================
   PASSWORD TOGGLE
========================================================= */

.show-pass{

    position:absolute;

    top:14px;
    right:15px;

    color:#7FFFD4;

    font-size:12px;
    font-weight:700;

    cursor:pointer;
}

/* =========================================================
   BUTTONS
========================================================= */

.action-btn{

    width:100%;

    margin-top:24px;

    padding:15px;

    border:none;

    border-radius:16px;

    cursor:pointer;

    font-size:16px;
    font-weight:700;

    color:white;

    background:
        linear-gradient(
            135deg,
            #1D9E75,
            #0F6E56
        );

    transition:0.25s;
}

.action-btn:hover{

    transform:translateY(-2px);

    box-shadow:
        0 12px 28px rgba(0,0,0,0.30);
}

/* =========================================================
   ALERT
========================================================= */

.alert{

    margin-top:16px;

    padding:12px;

    border-radius:12px;

    font-size:13px;
    font-weight:600;

    display:none;
}

.alert.error{

    background:
        rgba(255,80,80,0.15);

    color:#FFD2D2;

    border:
        1px solid rgba(255,80,80,0.35);
}

.alert.success{

    background:
        rgba(0,255,150,0.15);

    color:#D5FFF0;

    border:
        1px solid rgba(0,255,150,0.35);
}

/* =========================================================
   FOOTER
========================================================= */

.footer{

    margin-top:24px;

    text-align:center;

    font-size:12px;

    color:
        rgba(255,255,255,0.65);

    line-height:1.7;
}

.footer span{

    color:#7FFFD4;
    font-weight:700;
}

/* =========================================================
   RESPONSIVE
========================================================= */

@media(max-width:520px){

    .auth-card{

        width:100%;
        padding:24px;
    }

    .app-title{
        font-size:28px;
    }
}

</style>

</head>

<body>

<!-- =========================================================
     SCRIPT
========================================================= -->

<script>
/* =========================================================
   API CONFIG
========================================================= */

const API_BASE = "https://intellionboard.onrender.com";

/* =========================================================
   TAB SWITCH
========================================================= */
async function handleEmployeeRouting() {

    try {

        // =====================================================
        // GET EMPLOYEE ID
        // =====================================================

        const emp_id = localStorage.getItem("emp_id");

        console.log("LOCAL STORAGE EMP ID =>", emp_id);

        if (!emp_id || emp_id === "null" || emp_id === "undefined") {

            alert("Session expired. Please login again.");

            window.location.href = "login.html";

            return;
        }

        // =====================================================
        // FETCH EMPLOYEE DATA
        // =====================================================

        const res = await fetch(
            `${API_BASE}/api/auth/employee/${emp_id}`,
            {
                method: "GET",
                headers: {
                    "Content-Type": "application/json"
                },
                credentials: "include"
            }
        );

        if (!res.ok) {

            console.error("API FAILED =>", res.status);

            alert("Employee fetch failed");

            return;
        }

        // =====================================================
        // RESPONSE
        // =====================================================

        const response = await res.json();

        console.log("EMPLOYEE API RESPONSE =>", response);

        if (!response.success) {

            alert(response.message || "Employee not found");

            return;
        }

        // =====================================================
        // SAFE DATA EXTRACTION
        // =====================================================

        const employee = response.employee || {};

        const employeeName =
            employee.emp_name ||
            employee.name ||
            "Employee";

        const employeeEmail =
            employee.email || "";

        const selectedCOE =
            response.selected_coe ||
            employee.selected_coe ||
            "";

        // =====================================================
        // STORE LOCAL STORAGE
        // =====================================================

        localStorage.setItem(
            "emp_id",
            response.emp_id || emp_id
        );

        localStorage.setItem(
            "emp_name",
            employeeName
        );

        localStorage.setItem(
            "emp_email",
            employeeEmail
        );

        localStorage.setItem(
            "coe",
            selectedCOE
        );

        console.log("EMP NAME =>", employeeName);
        console.log("COE =>", selectedCOE);

        // =====================================================
        // REDIRECT
        // =====================================================

        if (
            selectedCOE &&
            selectedCOE !== "null" &&
            selectedCOE !== ""
        ) {

            console.log("Existing Employee -> LMS");

            window.location.href =
                "employee_dashboard.html";
        }

        else {

            console.log("New Employee -> BOT");

            window.location.href =
                "bot.html";
        }

    }

    catch (err) {

        console.error(
            "Employee Routing Error =>",
            err
        );

        alert(
            "Employee routing failed. Check console."
        );
    }
}
function showTab(tab){

    document.getElementById("loginSection").style.display =
        tab === "login" ? "block" : "none";

    document.getElementById("signupSection").style.display =
        tab === "signup" ? "block" : "none";

    document.getElementById("loginTabBtn").classList.remove("active");
    document.getElementById("signupTabBtn").classList.remove("active");

    if(tab === "login"){
        document.getElementById("loginTabBtn").classList.add("active");
    }else{
        document.getElementById("signupTabBtn").classList.add("active");
    }
}

/* =========================================================
   PASSWORD TOGGLE
========================================================= */

function togglePassword(id){

    const field = document.getElementById(id);

    field.type =
        field.type === "password"
        ? "text"
        : "password";
}

/* =========================================================
   EMAIL VALIDATION
========================================================= */

function isValidCorporateEmail(email){

    return email
        .toLowerCase()
        .endsWith("@infinite.com");
}

/* =========================================================
   ROLE ROUTING
========================================================= */

function redirectByRole(role){

    role = String(role || "")
        .trim()
        .toUpperCase();

    console.log("REDIRECT ROLE =>", role);

    switch(role){

        case "HEALTHCARE_PMO":
            window.location.href = "healthcare_pmo_dashboard.html";
            break;

        case "PMO":
            window.location.href = "pmo_dashboard_pro.html";
            break;

        case "HIRING_MANAGER":
            window.location.href = "hm_dashboard.html";
            break;

        case "REPORTING_MANAGER":
            window.location.href = "rm_dashboard.html";
            break;

        case "ITSG":
            window.location.href = "itsg_dashboard.html";
            break;

        case "ADMIN":
            window.location.href = "admin_dashboard.html";
            break;

        case "EMPLOYEE":
            // ✅ SPECIAL HANDLING
            handleEmployeeRouting();
            break;

        default:
            console.error("INVALID ROLE =>", role);
            alert("Invalid role mapping : " + role);
    }
}

/* =========================================================
   LOGIN
========================================================= */

async function login(){

    try{

        hideAlerts();

        const email = document.getElementById("loginEmail")
            .value.trim().toLowerCase();

        const password = document.getElementById("loginPassword")
            .value.trim();

        const selectedRole = document.getElementById("loginRole")
            .value.trim().toUpperCase();

        /* =====================================================
           ✅ VALIDATION
        ===================================================== */

        if(!email || !password || !selectedRole){
            showError("loginError", "Please fill all fields");
            return;
        }

        if(!isValidCorporateEmail(email)){
            showError("loginError", "Only @infinite.com email allowed");
            return;
        }

        console.log("LOGIN API =>", `${API_BASE}/api/auth/login`);

        /* =====================================================
           ✅ API CALL
        ===================================================== */

        const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: "POST",
            credentials: "include",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        console.log("LOGIN STATUS =>", response.status);

        let result;

        try{
            result = await response.json();
        }catch(e){
            console.error("JSON PARSE ERROR =>", e);
            showError("loginError", "Invalid backend response");
            return;
        }

        console.log("LOGIN RESPONSE =>", result);

        /* =====================================================
           ✅ LOGIN FAILED
        ===================================================== */

        if(!response.ok || !result.success){
            showError("loginError", result.message || "Invalid credentials");
            return;
        }

        /* =====================================================
           ✅ GET BACKEND ROLE
        ===================================================== */

        const backendRole = String(result.user?.role || "")
            .trim()
            .toUpperCase();

        console.log("BACKEND ROLE =>", backendRole);

        /* =====================================================
           ✅ ROLE MAPPING
        ===================================================== */

        const roleMap = {
            "ADMIN": "ADMIN",
            "ITSG": "ITSG",
            "EMPLOYEE": "EMPLOYEE",
            "REPORTING_MANAGER": "RM",
            "PMO": "ACCOUNT_PMO",
            "HEALTHCARE_PMO": "HEALTHCARE_PMO",
            "HIRING_MANAGER": "HM"
        };

        const mappedBackendRole =
            roleMap[backendRole] || backendRole;

        console.log("UI ROLE =>", selectedRole);
        console.log("MAPPED ROLE =>", mappedBackendRole);

        /* =====================================================
           ✅ ROLE VALIDATION
        ===================================================== */

        if(selectedRole !== mappedBackendRole){
            showError(
                "loginError",
                `This account belongs to ${backendRole}`
            );
            return;
        }

        /* =====================================================
           ✅ STORE SESSION (IMPORTANT)
        ===================================================== */

        localStorage.setItem("token", result.token || "");

        localStorage.setItem("user_email", result.user?.email || "");

        localStorage.setItem("user_role", backendRole);

        localStorage.setItem("user_location", result.user?.location || "");

        localStorage.setItem("user_name", result.user?.name || "");

        // ✅ IMPORTANT (USED IN ROUTING)
        localStorage.setItem("emp_id", result.user?.emp_id || "");
        localStorage.setItem("user_id", result.user?.id || "");

        console.log("LOGIN SUCCESS ✅");

        /* =====================================================
           ✅ SMART REDIRECT
        ===================================================== */

        redirectByRole(backendRole);

    }catch(error){

        console.error("LOGIN ERROR =>", error);

        showError(
            "loginError",
            "Server not reachable. Check backend."
        );
    }
}

/* =========================================================
   SIGNUP
========================================================= */

async function signup(){

    try{

        hideAlerts();

        const payload = {

            emp_id:
                document.getElementById("signupEmpId")
                .value
                .trim(),

            full_name:
                document.getElementById("signupName")
                .value
                .trim(),

            email:
                document.getElementById("signupEmail")
                .value
                .trim()
                .toLowerCase(),

            designation:
                document.getElementById("signupDesignation")
                .value
                .trim(),

            department: "",

            location:
                document.getElementById("signupLocation")
                .value
                .trim(),

            role:
                document.getElementById("signupRole")
                .value
                .trim()
                .toUpperCase(),

            password:
                document.getElementById("signupPassword")
                .value
                .trim()
        };

        /* =====================================================
           VALIDATION
        ===================================================== */

        if(

            !payload.emp_id ||
            !payload.full_name ||
            !payload.email ||
            !payload.role ||
            !payload.password

        ){

            showError(
                "signupError",
                "Please fill all mandatory fields"
            );

            return;
        }

        if(!isValidCorporateEmail(payload.email)){

            showError(
                "signupError",
                "Only @infinite.com emails allowed"
            );

            return;
        }

        if(payload.password.length < 8){

            showError(
                "signupError",
                "Password must contain minimum 8 characters"
            );

            return;
        }

        /* =====================================================
           ROLE MAPPING
        ===================================================== */

        const roleMap = {

            "ADMIN": "ADMIN",

            "ITSG": "ITSG",

            "EMPLOYEE": "EMPLOYEE",

            "RM": "REPORTING_MANAGER",

            "HM": "HIRING_MANAGER",

            "ACCOUNT_PMO": "PMO",

            "HEALTHCARE_PMO": "HEALTHCARE_PMO"
        };

        payload.role =
            roleMap[payload.role] || "EMPLOYEE";

        console.log("REGISTER PAYLOAD =>", payload);

        /* =====================================================
           API CALL
        ===================================================== */

        const response = await fetch(
            `${API_BASE}/api/auth/register`,
            {

                method: "POST",

                credentials: "include",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(payload)
            }
        );

        console.log("REGISTER STATUS =>", response.status);

        let result;

        try{

            result = await response.json();

        }catch(parseError){

            console.error(parseError);

            showError(
                "signupError",
                "Invalid backend response"
            );

            return;
        }

        console.log("REGISTER RESPONSE =>", result);

        /* =====================================================
           FAILED
        ===================================================== */

        if(!response.ok || !result.success){

            showError(
                "signupError",
                result.message || "Signup failed"
            );

            return;
        }

        /* =====================================================
           SUCCESS
        ===================================================== */

        showSuccess(
            "signupSuccess",
            "Account created successfully"
        );

        setTimeout(() => {

            showTab("login");

        }, 1500);

    }catch(error){

        console.error("SIGNUP ERROR =>", error);

        showError(
            "signupError",
            "Backend connection failed"
        );
    }
}

/* =========================================================
   ALERT HELPERS
========================================================= */

function showError(id, message){

    const box =
        document.getElementById(id);

    box.className =
        "alert error";

    box.style.display = "block";

    box.innerHTML = message;
}

function showSuccess(id, message){

    const box =
        document.getElementById(id);

    box.className =
        "alert success";

    box.style.display = "block";

    box.innerHTML = message;
}

function hideAlerts(){

    const alerts =
        document.querySelectorAll(".alert");

    alerts.forEach(alert => {

        alert.style.display = "none";

        alert.innerHTML = "";
    });
}

/* =========================================================
   SESSION CHECK
========================================================= */

async function validateSession() {

    try {

        console.log("Checking existing session...");

        // =====================================================
        // API CALL
        // =====================================================

        const response = await fetch(
            `${API_BASE}/api/auth/validate-session`,
            {
                method: "POST",

                credentials: "include",

                headers: {
                    "Content-Type": "application/json"
                }
            }
        );

        // =====================================================
        // INVALID RESPONSE
        // =====================================================

        if (!response.ok) {

            console.log(
                "No valid session found"
            );

            return;
        }

        // =====================================================
        // PARSE RESPONSE
        // =====================================================

        const result = await response.json();

        console.log(
            "SESSION CHECK =>",
            result
        );

        // =====================================================
        // SESSION FAILED
        // =====================================================

        if (!result.success) {

            console.log(
                "Session validation failed"
            );

            return;
        }

        // =====================================================
        // USER DATA
        // =====================================================

        const user =
            result.user || {};

        const role =
            String(user.role || "")
            .trim()
            .toUpperCase();

        // =====================================================
        // RESTORE LOCAL STORAGE
        // =====================================================

        localStorage.setItem(
            "token",
            "session-active"
        );

        localStorage.setItem(
            "user_email",
            user.email || ""
        );

        localStorage.setItem(
            "user_role",
            role
        );

        localStorage.setItem(
            "user_location",
            user.location || ""
        );

        localStorage.setItem(
            "user_name",
            user.name || ""
        );

        // IMPORTANT FIX
        localStorage.setItem(
            "emp_id",
            user.emp_id || ""
        );

        localStorage.setItem(
            "user_id",
            user.id || ""
        );

        // =====================================================
        // DEBUG
        // =====================================================

        console.log(
            "SESSION RESTORED"
        );

        console.log(
            "ROLE =>",
            role
        );

        console.log(
            "EMP ID =>",
            user.emp_id
        );

        // =====================================================
        // REDIRECT
        // =====================================================

        redirectByRole(role);

    }

    // =========================================================
    // ERROR
    // =========================================================

    catch (error) {

        console.log(
            "NO ACTIVE SESSION"
        );

        console.error(error);
    }
}
/* =========================================================
   AUTO SESSION VALIDATION
========================================================= */

window.onload = () => {
    const skipAutoLogin = window.location.search.includes("manual");

    if (!skipAutoLogin) {
        validateSession();
    }
};
