<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Account PMO AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ✅ USE YOUR FULL STYLE (PASTE EXACT ONE YOU SENT) -->
<style>
/* ✅ KEEP YOUR FULL STYLE FROM YOUR MESSAGE HERE */
/* (Already using same theme you provided) */
</style>

</head>

<body>

<div class="page">

<!-- =========================================
HEADER
========================================= -->
<div class="header glass-header">

<div class="header-left">
<div class="header-logo">🚀</div>
<div>
<h1>Account PMO AI Dashboard</h1>
<div class="header-subtitle">
RM Account Workforce Intelligence
</div>
</div>
</div>

<div class="header-right">

<div class="search-wrapper">
<span>🔍</span>
<input class="search-box"
placeholder="Search Employee / Role / Account"
onkeyup="searchTable(this.value)">
</div>

<select onchange="filterRole(this.value)" class="btn">
<option value="">All Roles</option>
<option>QA</option>
<option>DEV</option>
<option>AUTOMATION</option>
</select>

<button class="btn btn-refresh" onclick="loadDashboard()">🔄 Refresh</button>
<button class="btn btn-logout" onclick="logout()">🚪 Logout</button>

</div>
</div>

<!-- =========================================
KPI
========================================= -->
<div class="kpi-row">

<div class="kpi-card total-card">
<div class="kpi-title">Total</div>
<div id="total" class="kpi-value">0</div>
</div>

<div class="kpi-card pending-card">
<div class="kpi-title">Pending</div>
<div id="pending" class="kpi-value">0</div>
</div>

<div class="kpi-card progress-card">
<div class="kpi-title">In Progress</div>
<div id="progress" class="kpi-value">0</div>
</div>

<div class="kpi-card completed-card">
<div class="kpi-title">Completed</div>
<div id="completed" class="kpi-value">0</div>
</div>

</div>

<!-- ✅ ROLE ANALYTICS -->
<div class="kpi-row">

<div class="kpi-card">
<div id="qaCount" class="kpi-value">0</div>
<div class="kpi-title">QA Engineers</div>
</div>

<div class="kpi-card">
<div id="devCount" class="kpi-value">0</div>
<div class="kpi-title">Developers</div>
</div>

<div class="kpi-card">
<div id="autoCount" class="kpi-value">0</div>
<div class="kpi-title">Automation</div>
</div>

<div class="kpi-card">
<div id="rmSpan" class="kpi-value">0</div>
<div class="kpi-title">RM Span</div>
</div>

</div>

<!-- ✅ ACCOUNT INSIGHT -->
<div class="glass-card">

<div class="section-title">🏢 Account Intelligence</div>

<div id="accountInsights">Loading...</div>

</div>

<!-- =========================================
TABLE
========================================= -->

<div class="employee-card glass-card">

<div class="employee-header">
<h2>👥 Workforce</h2>
</div>

<div class="modern-table">

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Account</th>
<th>Status</th>
<th>Progress</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

</div>

</div>

<script>

/* =========================================
CONFIG
========================================= */

const BASE_URL = "http://127.0.0.1:5332";

/* ✅ RM LOGIN CONTEXT */
const rm_email = localStorage.getItem("email");

/* =========================================
GLOBAL STATE
========================================= */

let allEmployees = [];
let filteredEmployees = [];

/* =========================================
LOAD DASHBOARD
========================================= */

async function loadDashboard(){

    try{

        const res = await fetch(
            BASE_URL + "/employees-by-rm/" + rm_email
        );

        const data = await res.json();

        const accountFiltered = filterAccount(data);

        allEmployees = accountFiltered;
        filteredEmployees = [...accountFiltered];

        renderEmployees(filteredEmployees);

        updateKPIs(filteredEmployees);
        updateRoleStats(filteredEmployees);
        renderAccountInsights(filteredEmployees);

    }catch(err){
        console.log(err);
    }
}

/* =========================================
FILTER ACCOUNT
========================================= */

function filterAccount(data){

    if(!data.length) return [];

    const account = data[0].account_name;

    return data.filter(e =>
        e.account_name === account
    );
}

/* =========================================
RENDER TABLE
========================================= */

function renderEmployees(data){

    const tbody = document.getElementById("tableBody");

    tbody.innerHTML = "";

    data.forEach(emp => {

        let progress = emp.progress || 50;

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${emp.emp_id}</td>
        <td>${emp.emp_name}</td>
        <td>${emp.role || "QA"}</td>
        <td>${emp.account_name}</td>
        <td>${emp.onboarding_status}</td>
        <td>
            <div class="progress-container">
                <div class="progress-fill" style="width:${progress}%">
                ${progress}%
                </div>
            </div>
        </td>
        `;

        tbody.appendChild(row);
    });
}

/* =========================================
KPI
========================================= */

function updateKPIs(data){

    document.getElementById("total").innerText = data.length;

    document.getElementById("pending").innerText =
        data.filter(e => e.onboarding_status.includes("PENDING")).length;

    document.getElementById("progress").innerText =
        data.filter(e => e.onboarding_status.includes("PROGRESS")).length;

    document.getElementById("completed").innerText =
        data.filter(e => e.onboarding_status.includes("COMPLETE")).length;
}

/* =========================================
ROLE ANALYTICS
========================================= */

function updateRoleStats(data){

    let qa=0, dev=0, auto=0;
    let rms = new Set();

    data.forEach(e=>{

        const role = (e.role || "").toUpperCase();

        if(role.includes("QA")) qa++;
        else if(role.includes("DEV")) dev++;
        else if(role.includes("AUTO")) auto++;

        if(e.reporting_manager_email)
            rms.add(e.reporting_manager_email);
    });

    document.getElementById("qaCount").innerText = qa;
    document.getElementById("devCount").innerText = dev;
    document.getElementById("autoCount").innerText = auto;
    document.getElementById("rmSpan").innerText = rms.size;
}

/* =========================================
ACCOUNT INSIGHT
========================================= */

function renderAccountInsights(data){

    if(!data.length) return;

    const account = data[0].account_name;

    const total = data.length;

    const completed = data.filter(e =>
        e.onboarding_status.includes("COMPLETE")
    ).length;

    const percentage = Math.floor((completed/total)*100);

    document.getElementById("accountInsights").innerHTML =
    `
    <b>Account:</b> ${account}<br>
    👥 Total Employees: ${total}<br>
    ✅ Completed: ${completed}<br>
    📊 Completion Rate: ${percentage}%
    `;
}

/* =========================================
SEARCH
========================================= */

function searchTable(val){

    val = val.toLowerCase();

    filteredEmployees = allEmployees.filter(e =>
        JSON.stringify(e).toLowerCase().includes(val)
    );

    renderEmployees(filteredEmployees);
}

/* =========================================
ROLE FILTER
========================================= */

function filterRole(role){

    if(!role){
        filteredEmployees = [...allEmployees];
    }else{
        filteredEmployees = allEmployees.filter(e =>
            (e.role || "").toUpperCase().includes(role)
        );
    }

    renderEmployees(filteredEmployees);
}

/* =========================================
LOGOUT
========================================= */

function logout(){

    localStorage.clear();

    window.location.href = "login.html";
}

/* INIT */
loadDashboard();

</script>

</body>
</html>
