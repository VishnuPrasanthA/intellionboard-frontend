<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Account PMO AI Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* =========================================================
   NEXT-GEN PMO AI DASHBOARD UI
   FULLY FIXED • SINGLE ROW KPI • FIXED GLASS HEADER
========================================================= */

/* =========================================================
   ROOT
========================================================= */

:root{

    --primary:#19d3a2;
    --primary-dark:#10b88b;
    --primary-light:#ecfff9;

    --blue:#59b8ff;
    --purple:#9f74ff;
    --orange:#ffb84d;
    --red:#ff6f6f;
    --green:#34d47f;

    --text:#172b42;
    --muted:#7d8da5;

    --glass:rgba(255,255,255,0.68);

    --border:rgba(255,255,255,0.42);

    --bg1:#f5fbff;
    --bg2:#eef5ff;

    --shadow-sm:
    0 6px 18px rgba(15,23,42,.06);

    --shadow-md:
    0 16px 38px rgba(15,23,42,.10);

    --shadow-lg:
    0 30px 70px rgba(15,23,42,.16);

    --radius:22px;

    --transition:
    all .35s cubic-bezier(.22,1,.36,1);
}

/* =========================================================
   GLOBAL
========================================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{

    font-family:
    "Segoe UI",
    Inter,
    Arial,
    sans-serif;

    color:var(--text);

    background:
    radial-gradient(circle at top left,#dbfff4 0%,transparent 30%),
    radial-gradient(circle at top right,#ddeeff 0%,transparent 26%),
    radial-gradient(circle at bottom right,#fff4df 0%,transparent 28%),
    linear-gradient(135deg,var(--bg1),var(--bg2));

    min-height:100vh;

    overflow-x:hidden;

    position:relative;
}

/* animated background */

body::before{

    content:"";

    position:fixed;

    inset:0;

    background:
    radial-gradient(circle at 20% 20%,rgba(25,211,162,.05),transparent 18%),
    radial-gradient(circle at 80% 25%,rgba(89,184,255,.05),transparent 18%),
    radial-gradient(circle at 70% 80%,rgba(159,116,255,.05),transparent 18%);

    z-index:-1;

    animation:bgMove 20s linear infinite;
}

@keyframes bgMove{

    0%{
        transform:translateY(0px);
    }

    100%{
        transform:translateY(-60px);
    }
}

.page{

    padding:16px;

    padding-top:110px;
}

/* =========================================================
   SCROLLBAR
========================================================= */

::-webkit-scrollbar{
    width:10px;
    height:10px;
}

::-webkit-scrollbar-thumb{

    background:
    linear-gradient(180deg,var(--primary),#5effd9);

    border-radius:30px;
}

::-webkit-scrollbar-track{
    background:#edf5fb;
}

/* =========================================================
   GLASS
========================================================= */

.glass-card,
.glass-header{

    background:var(--glass);

    backdrop-filter:blur(18px);

    -webkit-backdrop-filter:blur(18px);

    border:1px solid var(--border);

    box-shadow:var(--shadow-sm);

    transition:var(--transition);
}

/* =========================================================
   HEADER FIXED
========================================================= */

.header{

    position:fixed;

    top:14px;
    left:14px;
    right:14px;

    z-index:999999;

    display:flex;

    align-items:center;

    justify-content:space-between;

    flex-wrap:nowrap;

    gap:14px;

    padding:14px 18px;

    border-radius:26px;

    overflow:hidden;
}

/* glowing animated border */

.header::before{

    content:"";

    position:absolute;

    inset:-2px;

    background:
    linear-gradient(
    90deg,
    rgba(25,211,162,.18),
    rgba(89,184,255,.18),
    rgba(159,116,255,.18),
    rgba(25,211,162,.18));

    background-size:300% 300%;

    z-index:-1;

    animation:borderMove 8s linear infinite;
}

@keyframes borderMove{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:100% 50%;
    }
}

.header:hover{

    transform:translateY(-2px);

    box-shadow:var(--shadow-lg);
}

/* =========================================================
   HEADER LEFT
========================================================= */

.header-left{

    display:flex;

    align-items:center;

    gap:12px;

    min-width:max-content;
}

.header-logo{

    width:56px;
    height:56px;

    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    background:
    linear-gradient(135deg,var(--primary),#53ffd7);

    color:white;

    font-size:26px;

    position:relative;

    box-shadow:
    0 12px 30px rgba(25,211,162,.28);

    transition:var(--transition);
}

.header-logo::after{

    content:"";

    position:absolute;

    inset:-7px;

    border-radius:24px;

    border:2px solid rgba(25,211,162,.15);

    animation:pulseRing 2.8s infinite;
}

@keyframes pulseRing{

    0%{
        transform:scale(.9);
        opacity:1;
    }

    100%{
        transform:scale(1.3);
        opacity:0;
    }
}

.header-logo:hover{

    transform:
    rotate(8deg)
    scale(1.08);
}

.header-left h1{

    font-size:18px;

    font-weight:800;

    color:#13253a;

    letter-spacing:.2px;

    line-height:1.1;

    white-space:nowrap;
}

.header-subtitle{

    margin-top:3px;

    font-size:11px;

    color:var(--muted);

    white-space:nowrap;
}

/* =========================================================
   HEADER RIGHT
========================================================= */

.header-right{

    display:flex;

    align-items:center;

    justify-content:flex-end;

    gap:10px;

    flex:1;

    min-width:0;
}

/* =========================================================
   SEARCH
========================================================= */

.search-wrapper{

    display:flex;

    align-items:center;

    gap:8px;

    background:rgba(255,255,255,.92);

    border:1px solid rgba(25,211,162,.08);

    border-radius:14px;

    padding:0 12px;

    height:48px;

    min-width:220px;

    max-width:320px;

    flex:1;

    transition:var(--transition);
}

.search-wrapper:hover{

    transform:translateY(-2px);

    box-shadow:
    0 10px 24px rgba(0,0,0,.06);
}

.search-wrapper:focus-within{

    border-color:rgba(25,211,162,.35);

    box-shadow:
    0 0 0 4px rgba(25,211,162,.10);
}

.search-icon{

    font-size:13px;

    color:var(--muted);
}

.search-box{

    width:100%;

    border:none;
    outline:none;

    background:transparent;

    font-size:12px;

    color:#162a3c;
}

.search-box::placeholder{
    color:#99a8b8;
}

/* =========================================================
   BUTTONS
========================================================= */

.btn,
button{

    border:none;

    cursor:pointer;

    border-radius:14px;

    font-weight:700;

    transition:var(--transition);

    position:relative;

    overflow:hidden;

    white-space:nowrap;
}

.btn{

    height:48px;

    padding:0 18px;

    font-size:12px;

    display:flex;
    align-items:center;
    justify-content:center;

    gap:6px;
}

/* shine */

.btn::before{

    content:"";

    position:absolute;

    top:0;
    left:-120%;

    width:100%;
    height:100%;

    background:
    linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,.35),
    transparent);

    transition:.8s;
}

.btn:hover::before{
    left:120%;
}

.btn:hover{

    transform:
    translateY(-3px)
    scale(1.02);

    box-shadow:var(--shadow-md);
}

.btn-refresh{

    background:
    linear-gradient(135deg,#3ea6ff,#73c7ff);

    color:white;
}

.btn-bulk{

    background:
    linear-gradient(135deg,#9257ff,#c48cff);

    color:white;
}

.btn-logout{

    background:
    linear-gradient(135deg,#ff6767,#ff8f7d);

    color:white;
}

/* =========================================================
   CARDS
========================================================= */

.glass-card{

    border-radius:28px;

    padding:18px;

    margin-bottom:16px;

    overflow:hidden;

    position:relative;
}

.glass-card::before{

    content:"";

    position:absolute;

    inset:0;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.14),
    transparent);

    pointer-events:none;
}

.glass-card:hover{

    transform:translateY(-4px);

    box-shadow:var(--shadow-lg);
}

/* =========================================================
   SECTION
========================================================= */

.section-top{

    display:flex;

    align-items:center;

    justify-content:space-between;

    gap:14px;

    margin-bottom:14px;
}

.section-title{

    font-size:16px;

    font-weight:800;

    color:var(--primary);
}

.section-sub{

    margin-top:3px;

    color:var(--muted);

    font-size:11px;
}

.live-chip{

    padding:9px 14px;

    border-radius:40px;

    font-size:11px;

    font-weight:800;

    color:var(--primary);

    background:
    linear-gradient(
    135deg,
    rgba(25,211,162,.10),
    rgba(25,211,162,.03));

    border:1px solid rgba(25,211,162,.15);
}

/* =========================================================
   UPLOAD ZONE SMALLER
========================================================= */

.modern-upload{

    border:2px dashed rgba(25,211,162,.24);

    border-radius:24px;

    background:
    linear-gradient(
    180deg,
    rgba(255,255,255,.92),
    rgba(245,255,251,.92));

    padding:28px 18px;

    text-align:center;

    position:relative;

    overflow:hidden;

    transition:var(--transition);
}

.modern-upload:hover{

    transform:translateY(-4px);

    border-color:var(--primary);

    box-shadow:
    0 20px 40px rgba(25,211,162,.10);
}

.upload-animation{

    font-size:40px;

    margin-bottom:10px;

    animation:floaty 3s ease-in-out infinite;
}

@keyframes floaty{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0px);
    }
}

.modern-upload h2{

    font-size:18px;

    margin-bottom:6px;
}

.modern-upload p{

    font-size:11px;

    color:var(--muted);

    margin-bottom:14px;
}

/* =========================================================
   KPI ROW FIXED SINGLE ROW
========================================================= */

.kpi-row{

    display:grid;

    grid-template-columns:repeat(4,minmax(0,1fr));

    gap:14px;

    margin-bottom:16px;
}

.kpi-card{

    background:rgba(255,255,255,.96);

    border-radius:24px;

    padding:18px;

    position:relative;

    overflow:hidden;

    transition:var(--transition);

    min-width:0;
}

.kpi-card::before{

    content:"";

    position:absolute;

    top:-40px;
    right:-40px;

    width:120px;
    height:120px;

    border-radius:50%;

    opacity:.08;
}

.total-card::before{
    background:var(--primary);
}

.pending-card::before{
    background:var(--orange);
}

.progress-card::before{
    background:var(--blue);
}

.completed-card::before{
    background:var(--green);
}

.kpi-card:hover{

    transform:
    translateY(-5px)
    scale(1.01);

    box-shadow:var(--shadow-lg);
}

.kpi-icon{

    font-size:22px;

    margin-bottom:10px;

    transition:var(--transition);
}

.kpi-card:hover .kpi-icon{

    transform:
    scale(1.12)
    rotate(6deg);
}

.kpi-title{

    font-size:11px;

    color:var(--muted);

    margin-bottom:6px;
}

.kpi-value{

    font-size:28px;

    font-weight:900;
}

.total-card .kpi-value{
    color:var(--primary);
}

.pending-card .kpi-value{
    color:var(--orange);
}

.progress-card .kpi-value{
    color:var(--blue);
}

.completed-card .kpi-value{
    color:var(--green);
}

/* =========================================================
   ANALYTICS SAME ROW
========================================================= */

.chart-grid{

    display:grid;

    grid-template-columns:repeat(3,minmax(0,1fr));

    gap:14px;

    margin-bottom:16px;
}

.analytics-card{

    min-height:240px;

    border-radius:24px;

    padding:16px;

    display:flex;
    flex-direction:column;
    align-items:center;

    overflow:hidden;
}

.analytics-card:hover{

    transform:translateY(-5px);

    box-shadow:var(--shadow-lg);
}

.card-title{

    font-size:14px;

    font-weight:800;

    margin-bottom:10px;
}

.chart-wrapper{

    flex:1;

    width:100%;

    display:flex;
    align-items:center;
    justify-content:center;
}

canvas{

    width:160px !important;
    height:160px !important;

    transition:var(--transition);
}

.analytics-card:hover canvas{
    transform:scale(1.04);
}

#worldMap{

    width:100%;
    height:165px;

    border-radius:16px;

    overflow:hidden;
}

/* =========================================================
   EMPLOYEE TABLE
========================================================= */

.employee-card{

    border-radius:28px;
}

.employee-header{

    display:flex;

    align-items:center;

    justify-content:space-between;

    margin-bottom:16px;
}

.employee-header h2{

    font-size:20px;

    margin-bottom:3px;
}

.employee-subtitle{

    color:var(--muted);

    font-size:11px;
}

.live-badge{

    padding:10px 14px;

    border-radius:40px;

    font-size:11px;

    font-weight:900;

    color:var(--primary);

    background:
    linear-gradient(
    135deg,
    rgba(25,211,162,.10),
    rgba(25,211,162,.03));

    border:1px solid rgba(25,211,162,.15);
}

/* =========================================================
   TABLE FIX
========================================================= */

.modern-table{

    width:100%;

    overflow-x:auto;

    overflow-y:hidden;

    border-radius:20px;

    border:1px solid rgba(230,237,245,.7);

    background:white;
}

/* FIXED TABLE HEIGHT */

.modern-table::-webkit-scrollbar{
    height:8px;
}

.modern-table::-webkit-scrollbar-thumb{
    background:linear-gradient(90deg,var(--primary),#58ffd9);
    border-radius:30px;
}

table{

    width:100%;

    min-width:1200px;

    border-collapse:collapse;

    table-layout:auto;

    background:white;
}

/* FIX HEADER OVERLAY ISSUE */

thead{

    position:sticky;

    top:0;

    z-index:100;

    background:
    linear-gradient(
    180deg,
    #fbfdff,
    #f2f7fd);
}

thead tr{

    background:
    linear-gradient(
    180deg,
    #fbfdff,
    #f2f7fd);
}

th{

    padding:16px 18px;

    text-align:left;

    font-size:11px;

    font-weight:900;

    color:#55657b;

    white-space:nowrap;

    border-bottom:1px solid #edf2f7;
}

td{

    padding:15px 18px;

    border-bottom:1px solid #eef3f8;

    font-size:11px;

    white-space:nowrap;
}

tbody tr{

    transition:var(--transition);
}

tbody tr:hover{

    background:
    linear-gradient(
    90deg,
    rgba(25,211,162,.04),
    rgba(89,184,255,.03));

    transform:scale(1.001);
}

/* =========================================================
   BADGES
========================================================= */

.status-badge,
.risk-badge{

    padding:6px 11px;

    border-radius:30px;

    font-size:10px;

    font-weight:900;

    color:white;

    display:inline-flex;
    align-items:center;
    gap:5px;
}

.pending-badge{
    background:linear-gradient(135deg,#f39c12,#ffc760);
}

.progress-badge{
    background:linear-gradient(135deg,#3498db,#6dc8ff);
}

.completed-badge{
    background:linear-gradient(135deg,#27ae60,#5ee49b);
}

.high-risk{
    background:linear-gradient(135deg,#ff5f5f,#ff9090);
}

.medium-risk{
    background:linear-gradient(135deg,#f39c12,#ffc760);
}

.low-risk{
    background:linear-gradient(135deg,#16c79a,#57f4cb);
}

/* =========================================================
   PROGRESS
========================================================= */

.progress-container{

    width:120px;

    background:#e8edf2;

    border-radius:30px;

    overflow:hidden;

    height:14px;
}

.progress-fill{

    height:100%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:9px;

    font-weight:900;

    color:white;

    background:
    linear-gradient(
    90deg,
    var(--primary),
    #55ffd5);
}

/* =========================================================
   INSIGHTS
========================================================= */

.insight-grid{

    display:grid;

    grid-template-columns:repeat(3,minmax(0,1fr));

    gap:14px;
}

.insight-box{

    background:white;

    border-radius:22px;

    padding:18px;

    display:flex;
    align-items:center;

    gap:12px;

    transition:var(--transition);
}

.insight-box:hover{

    transform:
    translateY(-5px)
    scale(1.01);

    box-shadow:var(--shadow-lg);
}

.insight-icon{

    width:54px;
    height:54px;

    border-radius:18px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:24px;

    color:white;
}

.high-risk-box .insight-icon{
    background:linear-gradient(135deg,#ff6060,#ff9999);
}

.escalation-box .insight-icon{
    background:linear-gradient(135deg,#f39c12,#ffd369);
}

.delayed-box .insight-icon{
    background:linear-gradient(135deg,#3498db,#7fd0ff);
}
.delay-badge{
    background:linear-gradient(135deg,#ff7675,#ff9aa2);
}

.insight-label{

    font-size:11px;

    color:var(--muted);

    margin-bottom:4px;
}

.insight-value{

    font-size:28px;

    font-weight:900;
}

/* =========================================================
   FLOATING AI
========================================================= */

.modern-fab{

    position:fixed;

    right:22px;
    bottom:22px;

    width:64px;
    height:64px;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:28px;

    color:white;

    background:
    linear-gradient(
    135deg,
    var(--primary),
    #58ffd9);

    box-shadow:
    0 18px 40px rgba(25,211,162,.28);

    cursor:pointer;

    z-index:99999;

    transition:var(--transition);
}

.modern-fab:hover{

    transform:
    scale(1.08)
    rotate(5deg);
}

/* =========================================================
   CHAT PANEL
========================================================= */

.modern-chat{

    position:fixed;

    right:22px;
    bottom:96px;

    width:380px;
    height:540px;

    background:white;

    border-radius:28px;

    overflow:hidden;

    display:none;
    flex-direction:column;

    z-index:99999;

    box-shadow:
    0 24px 60px rgba(0,0,0,.18);
}

.chat-header{

    background:
    linear-gradient(
    135deg,
    var(--primary),
    #49ffd5);

    color:white;

    padding:18px;

    font-weight:900;

    display:flex;
    align-items:center;
    justify-content:space-between;
}

.chat-body{

    flex:1;

    overflow-y:auto;

    padding:18px;

    background:#f8fbff;
}

.chat-welcome{

    background:white;

    border-radius:20px;

    padding:18px;

    line-height:1.8;

    font-size:12px;

    box-shadow:var(--shadow-sm);
}

.chat-input{

    display:flex;

    border-top:1px solid #edf2f7;

    background:white;
}

.chat-input input{

    flex:1;

    border:none;
    outline:none;

    padding:16px;

    font-size:12px;
}

.chat-input button{

    border:none;

    background:var(--primary);

    color:white;

    padding:0 22px;

    font-weight:900;
}

/* =========================================================
   RESPONSIVE
========================================================= */

@media(max-width:1200px){

    .chart-grid{
        grid-template-columns:1fr;
    }

    .insight-grid{
        grid-template-columns:1fr;
    }

    .header{
        flex-wrap:wrap;
    }

    .header-right{
        width:100%;
    }
}

@media(max-width:768px){

    .page{
        padding-top:160px;
    }

    .header{
        left:10px;
        right:10px;
    }

    .header-right{
        flex-wrap:wrap;
    }

    .search-wrapper{
        width:100%;
        max-width:none;
    }

    .kpi-row{
        grid-template-columns:repeat(2,1fr);
    }

    .modern-chat{

        width:95%;

        right:2.5%;

        height:82vh;
    }
}

</style>

</head>

<body>

<div class="page">

<!-- =========================================
HEADER
========================================= -->
<div class="header glass-header">

<div class="header-left">
<div class="header-logo">🚀</div>
<div>
<h1>Account PMO AI Dashboard</h1>
<div class="header-subtitle">
RM Account Workforce Intelligence
</div>
</div>
</div>

<div class="header-right">

<div class="search-wrapper">
<span>🔍</span>
<input class="search-box"
placeholder="Search Employee / Role / Account"
onkeyup="searchTable(this.value)">
</div>

<select onchange="filterRole(this.value)" class="btn">
<option value="">All Roles</option>
<option>QA</option>
<option>DEV</option>
<option>AUTOMATION</option>
</select>

<button class="btn btn-refresh" onclick="loadDashboard()">🔄 Refresh</button>
<button class="btn btn-logout" onclick="logout()">🚪 Logout</button>

</div>
</div>

<!-- =========================================
KPI
========================================= -->
<div class="kpi-row">

<div class="kpi-card total-card">
<div class="kpi-title">Total</div>
<div id="total" class="kpi-value">0</div>
</div>

<div class="kpi-card pending-card">
<div class="kpi-title">Pending</div>
<div id="pending" class="kpi-value">0</div>
</div>

<div class="kpi-card progress-card">
<div class="kpi-title">In Progress</div>
<div id="progress" class="kpi-value">0</div>
</div>

<div class="kpi-card completed-card">
<div class="kpi-title">Completed</div>
<div id="completed" class="kpi-value">0</div>
</div>

   <div class="glass-card">

<!-- =========================================
TABLE
========================================= -->

<div class="employee-card glass-card">

<div class="employee-header">
<h2>👥 Workforce</h2>
</div>

<div class="modern-table">

<table>

<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Account</th>
<th>Status</th>
<th>Progress</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

/* =========================================
CONFIG
========================================= */

const BASE_URL = "https://manatee-dislike-lifting.ngrok-free.dev";

// ── ngrok bypass ─────────────────────────────────────────
function apiFetch(url, opts = {}) {
    opts.headers = Object.assign({
        "ngrok-skip-browser-warning": "true"
    }, opts.headers || {});
    opts.credentials = opts.credentials || "include";
    return fetch(url, opts);
}

/* ✅ RM LOGIN CONTEXT (SAFE) */
let rm_email = localStorage.getItem("email");

/* fallback for testing */
if(!rm_email){
    rm_email = "test@company.com";
}

/* =========================================
GLOBAL STATE
========================================= */

let allEmployees = [];
let filteredEmployees = [];

/* =========================================
SAFE API CALL
========================================= */

async function callAPI(url, options = {}){

    try{

        const res = await apiFetch(url, {

            method: options.method || "GET",

            headers: {
                "Content-Type": "application/json",
                ...(options.headers || {})
            },

            body: options.body || null
        });

        if(!res.ok){

            const errorText = await res.text();

            console.error("API ERROR:", res.status, errorText);

            throw new Error("API Error: " + res.status);
        }

        const text = await res.text();

        if(!text){
            return {};
        }

        try{
            return JSON.parse(text);
        }
        catch(parseError){

            console.warn("⚠ Invalid JSON response:", text);

            return {};
        }

    }catch(err){

        console.error("❌ API FAILED:", err);

        return {};
    }
}

/* =========================================
LOAD DASHBOARD
========================================= */

async function loadDashboard(){

    try{

        const response = await callAPI(
            BASE_URL + "/account-pmo-dashboard",
            {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    email: rm_email
                })
            }
        );

        let data = [];

        /* ✅ HANDLE RESPONSE FORMAT */
        if(Array.isArray(response)){
            data = response;
        }
        else if(response && Array.isArray(response.data)){
            data = response.data;
        }
        else{
            data = [];
        }

        /* ✅ EMPTY STATE */
        if(!data.length){
            showEmptyState();
            return;
        }

        /* ✅ FILTER ACCOUNT */
        const accountFiltered = filterAccount(data);

        /* ✅ STORE GLOBAL STATE */
        allEmployees = accountFiltered;
        filteredEmployees = [...accountFiltered];

        /* ✅ RENDER UI */
        renderEmployees(filteredEmployees);

        updateKPIs(filteredEmployees);
        updateRoleStats(filteredEmployees);
        renderAccountInsights(filteredEmployees);
       await loadSLARisk();
await loadHeatmap();

    }catch(err){

        console.error("LOAD ERROR:", err);

        showEmptyState();
    }
}
let heatmapChart;

async function loadHeatmap(){

    const res = await callAPI(
        BASE_URL + "/account-heatmap",
        {
            method:"POST",
            body: JSON.stringify({
                email: rm_email
            })
        }
    );

    const data = res.data || [];

    const labels = data.map(x => x.location);
    const values = data.map(x => x.count);

    if(heatmapChart){
        heatmapChart.destroy();
    }

    heatmapChart = new Chart(
        document.getElementById("heatmapChart"),
        {
            type: "bar",
            data: {
                labels: labels,
                datasets: [{
                    label: "Employees",
                    data: values
                }]
            }
        }
    );
}
/* =========================================
EMPTY STATE
========================================= */

function showEmptyState(){

    document.getElementById("tableBody").innerHTML =
    `<tr><td colspan="6" style="text-align:center;">No Data Found</td></tr>`;

    document.getElementById("total").innerText = 0;
    document.getElementById("pending").innerText = 0;
    document.getElementById("progress").innerText = 0;
    document.getElementById("completed").innerText = 0;

    document.getElementById("accountInsights").innerText =
        "No account data available";
}

/* =========================================
FILTER ACCOUNT
========================================= */
async function loadSLARisk(){

    const res = await callAPI(
        BASE_URL + "/sla-risk",
        {
            method:"POST",
            body: JSON.stringify({
                email: rm_email
            })
        }
    );

    const data = res.data || [];

    let delayed = data.filter(e => e.sla_delay).length;

    document.getElementById("slaInsights").innerHTML = `
        🚨 Delayed Employees: <b>${delayed}</b><br>
        📊 Total Checked: ${data.length}
    `;
}
function filterAccount(data){

    if(!data.length) return [];

    const account = data[0].account_name;

    return data.filter(e =>
        e.account_name === account
    );
}

/* =========================================
RENDER TABLE
========================================= */

function renderEmployees(data){

    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    data.forEach(emp => {

        let progress = emp.progress_percentage || 10;

        const row = document.createElement("tr");

        row.innerHTML = `
        <td>${safe(emp.emp_id)}</td>
        <td>${safe(emp.emp_name)}</td>
        <td>${safe(emp.designation)}</td>
        <td>${safe(emp.account_name)}</td>
        <td>${safe(emp.onboarding_status)}</td>
        <td>
            <div class="progress-container">
                <div class="progress-fill" style="width:${progress}%">
                ${progress}%
                </div>
            </div>
        </td>
        `;

        tbody.appendChild(row);
    });
}

/* =========================================
SAFE VALUE
========================================= */

function safe(val){
    return val ? val : "N/A";
}

/* =========================================
KPI
========================================= */

function updateKPIs(data){

    document.getElementById("total").innerText = data.length;

    document.getElementById("pending").innerText =
        data.filter(e => (e.onboarding_status||"").includes("PENDING")).length;

    document.getElementById("progress").innerText =
        data.filter(e => (e.onboarding_status||"").includes("PROGRESS")).length;

    document.getElementById("completed").innerText =
        data.filter(e => (e.onboarding_status||"").includes("COMPLETE")).length;
}

/* =========================================
ROLE ANALYTICS
========================================= */

function updateRoleStats(data){

    let qa=0, dev=0, auto=0;
    let rms = new Set();

    data.forEach(e=>{

        const role = (e.designation || "").toUpperCase();

        if(role.includes("QA")) qa++;
        else if(role.includes("DEV")) dev++;
        else if(role.includes("AUTO")) auto++;

        if(e.reporting_manager_email)
            rms.add(e.reporting_manager_email);
    });

    document.getElementById("qaCount").innerText = qa;
    document.getElementById("devCount").innerText = dev;
    document.getElementById("autoCount").innerText = auto;
    document.getElementById("rmSpan").innerText = rms.size;
}

/* =========================================
ACCOUNT INSIGHT
========================================= */

function renderAccountInsights(data){

    if(!data.length) return;

    const account = data[0].account_name;

    const total = data.length;

    const completed = data.filter(e =>
        (e.onboarding_status||"").includes("COMPLETE")
    ).length;

    const percentage =
        total ? Math.floor((completed/total)*100) : 0;

    document.getElementById("accountInsights").innerHTML =
    `
    <b>Account:</b> ${account}<br>
    👥 Total Employees: ${total}<br>
    ✅ Completed: ${completed}<br>
    📊 Completion Rate: ${percentage}%
    `;
}

/* =========================================
SEARCH
========================================= */

function searchTable(val){

    val = val.toLowerCase();

    filteredEmployees = allEmployees.filter(e =>
        JSON.stringify(e).toLowerCase().includes(val)
    );

    renderEmployees(filteredEmployees);
}

/* =========================================
ROLE FILTER
========================================= */

function filterRole(role){

    if(!role){
        filteredEmployees = [...allEmployees];
    }else{
        filteredEmployees = allEmployees.filter(e =>
            (e.role || "").toUpperCase().includes(role)
        );
    }

    renderEmployees(filteredEmployees);
}

/* =========================================
LOGOUT
========================================= */

async function logout(){

    try{

        await apiFetch(
            BASE_URL + "/api/auth/logout",
            {
                method:"POST",
                credentials:"include"
            }
        );

    }catch(err){
        console.log(err);
    }

    localStorage.clear();

    sessionStorage.clear();

    window.location.replace(
        "https://intellionboard.vercel.app/"
    );
}
/* =========================================
AUTO REFRESH
========================================= */

setInterval(loadDashboard, 60000);

/* INIT */
loadDashboard();

</script>
