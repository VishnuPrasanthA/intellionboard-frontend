<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Forgot Password</title>

<style>
body{
    font-family:Arial;
    background:linear-gradient(135deg,#021B1A,#0F6E56);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:rgba(255,255,255,0.1);
    padding:30px;
    border-radius:20px;
    width:350px;
    text-align:center;
    backdrop-filter:blur(10px);
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    margin-top:15px;
    border:none;
}

button{
    margin-top:20px;
    padding:12px;
    width:100%;
    border:none;
    border-radius:12px;
    background:#19d3a2;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.alert{
    margin-top:10px;
    color:#fff;
}
</style>
</head>

<body>

<div class="card">

    <h2 style="color:white;">Forgot Password</h2>

    <input type="email" id="email" placeholder="Enter your email">

    <button onclick="sendReset()">Send Reset Link</button>

    <div id="msg" class="alert"></div>

</div>

<script>
const API_BASE = "https://intellionboard.onrender.com";

async function sendReset(){

    const email = document.getElementById("email").value;

    const res = await fetch(`${API_BASE}/api/auth/forgot-password`,{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ email })
    });

    const data = await res.json();

    document.getElementById("msg").innerText =
        data.message || "Check your email";
}
</script>

</body>
</html>
