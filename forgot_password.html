<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — IntelliOnboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:"Segoe UI",Arial,sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#021B1A 0%,#063D36 30%,#0F6E56 100%);
    padding:30px;
}
.card{
    width:420px;
    padding:36px 32px;
    border-radius:24px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:0 10px 45px rgba(0,0,0,0.35);
    animation:fadeUp 0.5s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo-wrap{text-align:center;margin-bottom:22px}
.logo{
    width:70px;height:70px;margin:auto;border-radius:18px;
    background:#fff;display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.2);overflow:hidden;
}
.logo img{width:70%;height:70%;object-fit:contain}
.app-title{color:#fff;font-size:26px;font-weight:800;margin-top:14px}
.step-label{color:rgba(255,255,255,0.6);font-size:12px;margin-top:6px;letter-spacing:.5px}
.step-indicator{
    display:flex;align-items:center;justify-content:center;
    gap:8px;margin:18px 0 24px;
}
.step-dot{
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:700;
    background:rgba(255,255,255,0.12);color:rgba(255,255,255,0.45);
    border:1.5px solid rgba(255,255,255,0.15);
    transition:.3s;
}
.step-dot.active{background:linear-gradient(135deg,#1D9E75,#0F6E56);color:#fff;border-color:transparent}
.step-dot.done{background:rgba(29,158,117,0.25);color:#7FFFD4;border-color:rgba(29,158,117,0.5)}
.step-line{flex:1;height:1px;background:rgba(255,255,255,0.15);max-width:40px}
label{display:block;margin-bottom:7px;font-size:13px;font-weight:600;color:#fff}
.form-group{margin-top:18px}
input{
    width:100%;padding:13px 15px;
    border-radius:13px;border:1px solid rgba(255,255,255,0.12);
    background:rgba(255,255,255,0.08);color:#fff;
    font-size:14px;outline:none;transition:.25s;
    font-family:"Segoe UI",Arial,sans-serif;
}
input::placeholder{color:rgba(255,255,255,0.45)}
input:focus{
    border-color:rgba(38,255,186,0.5);
    background:rgba(255,255,255,0.12);
    box-shadow:0 0 0 4px rgba(38,255,186,0.1);
}

/* OTP boxes */
.otp-wrap{display:flex;gap:10px;margin-top:7px}
.otp-box{
    flex:1;padding:14px 0;text-align:center;
    border-radius:12px;border:1px solid rgba(255,255,255,0.15);
    background:rgba(255,255,255,0.08);color:#fff;
    font-size:22px;font-weight:700;outline:none;
    transition:.25s;letter-spacing:0;
    font-family:"Segoe UI",Arial,sans-serif;
}
.otp-box:focus{
    border-color:rgba(38,255,186,0.5);
    background:rgba(255,255,255,0.12);
    box-shadow:0 0 0 3px rgba(38,255,186,0.1);
}

/* Password strength */
.pw-bar-wrap{margin-top:8px;display:none}
.pw-bar{height:4px;border-radius:4px;background:rgba(255,255,255,0.1);overflow:hidden}
.pw-bar-fill{height:100%;border-radius:4px;width:0;transition:width .3s,background .3s}
.pw-bar-label{font-size:11px;font-weight:600;margin-top:4px;color:rgba(255,255,255,0.5)}
.pw-rules{margin-top:8px;font-size:11px;color:rgba(255,255,255,0.45);line-height:1.9}
.pw-rules span{display:block}.pw-rules .ok{color:#7FFFD4}.pw-rules .bad{color:rgba(255,255,255,0.35)}

.show-pass{
    position:absolute;top:13px;right:14px;
    color:#7FFFD4;font-size:12px;font-weight:700;cursor:pointer;
}
.pw-wrap{position:relative}

.btn{
    width:100%;margin-top:22px;padding:14px;
    border:none;border-radius:14px;cursor:pointer;
    font-size:15px;font-weight:700;color:#fff;
    background:linear-gradient(135deg,#1D9E75,#0F6E56);
    transition:.25s;font-family:"Segoe UI",Arial,sans-serif;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 26px rgba(0,0,0,0.28)}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none}

.resend-wrap{text-align:center;margin-top:14px}
.resend-link{color:#7FFFD4;font-size:12px;font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit}
.resend-link:disabled{color:rgba(255,255,255,0.3);cursor:not-allowed}
.resend-timer{font-size:12px;color:rgba(255,255,255,0.45)}

.alert{
    margin-top:14px;padding:11px 13px;border-radius:12px;
    font-size:13px;font-weight:600;display:none;line-height:1.5;
}
.alert.error{background:rgba(255,80,80,0.14);color:#FFD2D2;border:1px solid rgba(255,80,80,0.3)}
.alert.success{background:rgba(0,255,150,0.13);color:#D5FFF0;border:1px solid rgba(0,255,150,0.3)}
.alert.info{background:rgba(38,200,255,0.12);color:#B8F0FF;border:1px solid rgba(38,200,255,0.28)}

.back-link{
    display:block;text-align:center;margin-top:18px;
    color:rgba(255,255,255,0.55);font-size:12px;text-decoration:none;
}
.back-link:hover{color:#7FFFD4}
.success-icon{
    font-size:48px;text-align:center;margin:10px 0 6px;
}

/* Step panels */
.panel{display:none}.panel.active{display:block}
</style>
</head>
<body>
<div class="card">
    <div class="logo-wrap">
        <div class="logo"><img src="logo.png" alt="Logo"></div>
        <div class="app-title">IntelliOnboard</div>
        <div class="step-label" id="stepLabel">Password reset</div>
    </div>

    <!-- Step indicator -->
    <div class="step-indicator">
        <div class="step-dot active" id="dot1">1</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot2">2</div>
        <div class="step-line"></div>
        <div class="step-dot" id="dot3">3</div>
    </div>

    <!-- ── STEP 1: Enter email ── -->
    <div class="panel active" id="panel1">
        <div class="form-group">
            <label>Corporate Email</label>
            <input type="email" id="emailInput"
                   placeholder="Enter your @infinite.com email"
                   onkeydown="if(event.key==='Enter')sendOtp()">
        </div>
        <button class="btn" id="btnSendOtp" onclick="sendOtp()">Send Verification Code</button>
        <div class="alert" id="alertStep1"></div>
        <a href="index.html" class="back-link">← Back to login</a>
    </div>

    <!-- ── STEP 2: Enter OTP ── -->
    <div class="panel" id="panel2">
        <div class="form-group">
            <label>6-digit verification code</label>
            <div class="otp-wrap" id="otpWrap">
                <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="o1" onkeyup="otpKey(event,null,'o2')" oninput="otpInput(this)">
                <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="o2" onkeyup="otpKey(event,'o1','o3')" oninput="otpInput(this)">
                <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="o3" onkeyup="otpKey(event,'o2','o4')" oninput="otpInput(this)">
                <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="o4" onkeyup="otpKey(event,'o3','o5')" oninput="otpInput(this)">
                <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="o5" onkeyup="otpKey(event,'o4','o6')" oninput="otpInput(this)">
                <input class="otp-box" maxlength="1" inputmode="numeric" pattern="[0-9]"
                       id="o6" onkeyup="otpKey(event,'o5',null)" oninput="otpInput(this)">
            </div>
        </div>
        <button class="btn" id="btnVerifyOtp" onclick="verifyOtp()">Verify Code</button>
        <div class="resend-wrap">
            <span class="resend-timer" id="timerLabel"></span>
            <button class="resend-link" id="btnResend" disabled onclick="resendOtp()">Resend code</button>
        </div>
        <div class="alert" id="alertStep2"></div>
        <span class="back-link" style="cursor:pointer" onclick="goStep(1)">← Change email</span>
    </div>

    <!-- ── STEP 3: Set new password ── -->
    <div class="panel" id="panel3">
        <div class="form-group">
            <label>New password</label>
            <div class="pw-wrap">
                <input type="password" id="newPw"
                       placeholder="Min 8 chars, upper, lower, number, special"
                       oninput="checkStrength(this.value)"
                       onkeydown="if(event.key==='Enter')resetPassword()">
                <span class="show-pass" onclick="togglePw('newPw')">SHOW</span>
            </div>
            <div class="pw-bar-wrap" id="pwBarWrap">
                <div class="pw-bar"><div class="pw-bar-fill" id="pwFill"></div></div>
                <div class="pw-bar-label" id="pwLabel"></div>
                <div class="pw-rules">
                    <span id="rLen">✗ At least 8 characters</span>
                    <span id="rUp">✗ One uppercase letter (A–Z)</span>
                    <span id="rLow">✗ One lowercase letter (a–z)</span>
                    <span id="rNum">✗ One number (0–9)</span>
                    <span id="rSp">✗ One special character (!@#$%^&*)</span>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Confirm password</label>
            <div class="pw-wrap">
                <input type="password" id="confirmPw"
                       placeholder="Re-enter new password"
                       onkeydown="if(event.key==='Enter')resetPassword()">
                <span class="show-pass" onclick="togglePw('confirmPw')">SHOW</span>
            </div>
        </div>
        <button class="btn" id="btnReset" onclick="resetPassword()">Set New Password</button>
        <div class="alert" id="alertStep3"></div>
    </div>

    <!-- ── STEP 4: Done ── -->
    <div class="panel" id="panel4">
        <div class="success-icon">✅</div>
        <p style="color:#D5FFF0;text-align:center;font-size:15px;font-weight:600;margin-top:6px">
            Password updated successfully!
        </p>
        <p style="color:rgba(255,255,255,0.6);text-align:center;font-size:13px;margin-top:8px">
            You can now log in with your new password.
        </p>
        <button class="btn" style="margin-top:24px" onclick="window.location.href='index.html'">
            Go to Login
        </button>
    </div>
</div>

<script>
const API  = "https://manatee-dislike-lifting.ngrok-free.dev";
let emailUsed = "";
let otpToken  = "";   // backend returns a token after OTP verified
let resendInterval = null;

/* ── Helpers ── */
function showAlert(id, type, msg){
    const el = document.getElementById(id);
    el.className = "alert " + type;
    el.style.display = "block";
    el.innerHTML = msg;
}
function clearAlert(id){
    const el = document.getElementById(id);
    el.style.display = "none";
    el.innerHTML = "";
}
function setBtn(id, disabled, text){
    const b = document.getElementById(id);
    b.disabled = disabled;
    if(text) b.textContent = text;
}

/* ── Step navigation ── */
function goStep(n){
    [1,2,3,4].forEach(i => {
        document.getElementById("panel"+i).classList.remove("active");
        const dot = document.getElementById("dot"+i);
        if(dot){
            dot.classList.remove("active","done");
            if(i < n)  dot.classList.add("done");
            if(i === n) dot.classList.add("active");
        }
    });
    document.getElementById("panel"+n).classList.add("active");
    const labels = ["","Enter your email","Enter verification code","Set new password","Done"];
    document.getElementById("stepLabel").textContent = labels[n] || "Password reset";
}

/* ── Toggle password visibility ── */
function togglePw(id){
    const f = document.getElementById(id);
    f.type = f.type === "password" ? "text" : "password";
}

/* ── Password strength ── */
const RULES = [
    {re:/.{8,}/,     id:"rLen", ok:"✓ At least 8 characters",       bad:"✗ At least 8 characters"},
    {re:/[A-Z]/,     id:"rUp",  ok:"✓ One uppercase letter (A–Z)",   bad:"✗ One uppercase letter (A–Z)"},
    {re:/[a-z]/,     id:"rLow", ok:"✓ One lowercase letter (a–z)",   bad:"✗ One lowercase letter (a–z)"},
    {re:/[0-9]/,     id:"rNum", ok:"✓ One number (0–9)",             bad:"✗ One number (0–9)"},
    {re:/[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>/?`~]/, id:"rSp",
     ok:"✓ One special character (!@#$%^&*)", bad:"✗ One special character (!@#$%^&*)"},
];
function checkStrength(pw){
    const wrap = document.getElementById("pwBarWrap");
    if(!pw){ wrap.style.display="none"; return; }
    wrap.style.display = "block";
    let passed = 0;
    RULES.forEach(r => {
        const ok = r.re.test(pw);
        const el = document.getElementById(r.id);
        el.textContent = ok ? r.ok : r.bad;
        el.className   = ok ? "ok" : "bad";
        if(ok) passed++;
    });
    const fill  = document.getElementById("pwFill");
    const label = document.getElementById("pwLabel");
    fill.style.width = (passed/5*100)+"%";
    const levels = ["","Weak","Fair","Good","Strong","Strong ✓"];
    const colors  = ["","#ff5f5f","#ffb84d","#59b8ff","#7FFFD4","#7FFFD4"];
    fill.style.background  = colors[passed];
    label.textContent      = levels[passed];
    label.style.color      = colors[passed];
}
function isStrongPw(pw){
    return RULES.every(r => r.re.test(pw));
}

/* ── OTP input UX ── */
function otpInput(el){
    el.value = el.value.replace(/\D/,"").slice(0,1);
}
function otpKey(e, prevId, nextId){
    if(e.key === "Backspace" && !e.target.value && prevId){
        document.getElementById(prevId).focus();
    } else if(e.target.value && nextId){
        document.getElementById(nextId).focus();
    }
    if(e.key === "Enter") verifyOtp();
}
function getOtp(){
    return ["o1","o2","o3","o4","o5","o6"].map(id => document.getElementById(id).value).join("");
}
function clearOtp(){
    ["o1","o2","o3","o4","o5","o6"].forEach(id => document.getElementById(id).value = "");
    document.getElementById("o1").focus();
}

/* ── Resend timer ── */
function startTimer(seconds){
    clearInterval(resendInterval);
    setBtn("btnResend", true);
    const el = document.getElementById("timerLabel");
    let s = seconds;
    el.textContent = `Resend in ${s}s`;
    resendInterval = setInterval(() => {
        s--;
        if(s <= 0){
            clearInterval(resendInterval);
            el.textContent = "";
            setBtn("btnResend", false);
        } else {
            el.textContent = `Resend in ${s}s`;
        }
    }, 1000);
}

/* ══════════════════════════════════════
   STEP 1 — Send OTP
══════════════════════════════════════ */
async function sendOtp(){
    clearAlert("alertStep1");
    const email = document.getElementById("emailInput").value.trim().toLowerCase();

    if(!email){
        showAlert("alertStep1","error","Please enter your email address."); return;
    }
    if(!email.endsWith("@infinite.com")){
        showAlert("alertStep1","error","Only @infinite.com email addresses are allowed."); return;
    }

    setBtn("btnSendOtp", true, "Sending…");
    try {
        const res  = await fetch(`${API}/api/auth/forgot-password`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ email }),
            credentials:"include"
        });
        const data = await res.json();

        if(!res.ok || !data.success){
            showAlert("alertStep1","error", data.message || "Email not found. Check and try again.");
            return;
        }
        emailUsed = email;
        showAlert("alertStep1","success",
            `Verification code sent to <strong>${email}</strong>. Check your inbox.`);
        setTimeout(() => { goStep(2); startTimer(60); }, 900);

    } catch(e){
        showAlert("alertStep1","error","Server not reachable. Try again.");
    } finally {
        setBtn("btnSendOtp", false, "Send Verification Code");
    }
}

/* ══════════════════════════════════════
   STEP 2 — Verify OTP
══════════════════════════════════════ */
async function verifyOtp(){
    clearAlert("alertStep2");
    const otp = getOtp();
    if(otp.length < 6){
        showAlert("alertStep2","error","Enter all 6 digits of the code."); return;
    }

    setBtn("btnVerifyOtp", true, "Verifying…");
    try {
        const res  = await fetch(`${API}/api/auth/verify-otp`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ email: emailUsed, otp }),
            credentials:"include"
        });
        const data = await res.json();

        if(!res.ok || !data.success){
            const code = data.error_code || "";
            if(code === "OTP_EXPIRED"){
                showAlert("alertStep2","error","Code has expired. Request a new one.");
            } else if(code === "OTP_INVALID"){
                showAlert("alertStep2","error","Incorrect code. Check and try again.");
            } else {
                showAlert("alertStep2","error", data.message || "Verification failed.");
            }
            clearOtp();
            return;
        }
        otpToken = data.reset_token || "";
        clearInterval(resendInterval);
        goStep(3);

    } catch(e){
        showAlert("alertStep2","error","Server not reachable. Try again.");
    } finally {
        setBtn("btnVerifyOtp", false, "Verify Code");
    }
}

/* ── Resend OTP ── */
async function resendOtp(){
    clearAlert("alertStep2");
    clearOtp();
    setBtn("btnResend", true);
    try {
        const res  = await fetch(`${API}/api/auth/forgot-password`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({ email: emailUsed }),
            credentials:"include"
        });
        const data = await res.json();
        if(data.success){
            showAlert("alertStep2","info","New code sent. Check your inbox.");
            startTimer(60);
        } else {
            showAlert("alertStep2","error", data.message || "Could not resend. Try again.");
            setBtn("btnResend", false);
        }
    } catch(e){
        showAlert("alertStep2","error","Server not reachable.");
        setBtn("btnResend", false);
    }
}

/* ══════════════════════════════════════
   STEP 3 — Reset Password
══════════════════════════════════════ */
async function resetPassword(){
    clearAlert("alertStep3");
    const pw1 = document.getElementById("newPw").value;
    const pw2 = document.getElementById("confirmPw").value;

    if(!pw1 || !pw2){
        showAlert("alertStep3","error","Please fill both password fields."); return;
    }
    if(!isStrongPw(pw1)){
        showAlert("alertStep3","error",
            "Password must be at least 8 characters with uppercase, lowercase, number, and special character.");
        return;
    }
    if(pw1 !== pw2){
        showAlert("alertStep3","error","Passwords do not match."); return;
    }

    setBtn("btnReset", true, "Saving…");
    try {
        const res  = await fetch(`${API}/api/auth/reset-password`, {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                email:       emailUsed,
                reset_token: otpToken,
                new_password: pw1
            }),
            credentials:"include"
        });
        const data = await res.json();

        if(!res.ok || !data.success){
            showAlert("alertStep3","error", data.message || "Reset failed. Request a new code.");
            return;
        }
        goStep(4);

    } catch(e){
        showAlert("alertStep3","error","Server not reachable. Try again.");
    } finally {
        setBtn("btnReset", false, "Set New Password");
    }
}
</script>
</body>
</html>
